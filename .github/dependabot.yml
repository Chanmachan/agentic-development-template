version: 2
updates:
  # This template has no application manifests (no package.json, requirements.txt,
  # etc.) yet, so the only dependencies to keep current are the GitHub Actions
  # pinned in .github/workflows/. Add an ecosystem here once a language stack
  # is chosen (see README "Checklist: What to Edit When Starting a New Project").
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
